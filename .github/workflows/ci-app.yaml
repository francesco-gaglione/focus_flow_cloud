name: App CI

on:
  pull_request:
    branches: ["*"]
    paths:
      - "focus_flow_app/**"
      - ".github/workflows/ci-app.yaml"
  push:
    branches: ["master"]
    paths:
      - "focus_flow_app/**"
      - ".github/workflows/ci-app.yaml"

jobs:
  check:
    if: "!contains(github.event.head_commit.message, 'chore: bump')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: focus_flow_app

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "focus_flow_app"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test
