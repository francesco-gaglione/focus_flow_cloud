apiVersion: v1
kind: ConfigMap
metadata:
  name: focus-flow-cloud-config
  namespace: focus-flow-cloud
data:
  CORS_ORIGIN: "*"
  SERVER_PORT: "8080"
  RUST_LOG: "info"
  DATABASE_BASE_URL: postgres-service
  POSTGRES_USER: "focus_flow_cloud"
  POSTGRES_PASSWORD: "focus_flow_cloud_password"
  APP_ENV: "production"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "admin"
  OTLP_ENDPOINT: "http://localhost:4317"
